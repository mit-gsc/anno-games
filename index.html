<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Puzzle Game</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: auto; padding: 20px; }
    .hidden { display: none; }
    input, select { padding: 8px; width: 100%; margin-bottom: 10px; }
    button { padding: 10px; width: 100%; margin-bottom: 10px; }
    #leaderboard li { margin: 4px 0; }
  </style>
</head>
<body>

<h2>Puzzle Game</h2>

<!-- AUTH SECTION -->
<div id="auth-section">
  <h3>Login</h3>
  <input id="login-email" placeholder="Email">
  <input id="login-password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>

  <h3>Register</h3>
  <input id="reg-email" placeholder="Email">
  <input id="reg-password" type="password" placeholder="Password">
  <button onclick="registerUser()">Register</button>

  <p id="auth-message"></p>
</div>

<!-- GAME SECTION -->
<div id="game-section" class="hidden">
  <h3>Welcome, <span id="user-email"></span></h3>

  <!-- PUZZLE SELECTOR -->
  <h4>Select Puzzle</h4>
  <select id="puzzle-select" onchange="loadPuzzle()">
    <option value="puzzle1">Puzzle 1</option>
    <option value="puzzle2">Puzzle 2</option>
    <option value="puzzle3">Puzzle 3</option>
  </select>

  <!-- PUZZLE DISPLAY -->
  <p id="puzzle-description">Select a puzzle above.</p>
  <input id="puzzle-answer" placeholder="Your answer">
  <button onclick="submitPuzzle()">Submit Answer</button>
  <p id="puzzle-message"></p>

  <!-- LEADERBOARD -->
  <h4>Leaderboard</h4>
  <select id="leaderboard-select" onchange="loadLeaderboard()">
    <option value="puzzle1">Puzzle 1</option>
    <option value="puzzle2">Puzzle 2</option>
    <option value="puzzle3">Puzzle 3</option>
  </select>

  <ul id="leaderboard"></ul>

  <button onclick="logout()">Logout</button>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwMOSlUGrDQi536bd7_iLAc7t4Z1oTT-JE8KXkHHW-JHT51IrQJdcr0y7GP7hh5j9gDPg/exec";

/* -------------------------
   SESSION MANAGEMENT
-------------------------- */
function saveSession(email, token) {
  localStorage.setItem("email", email);
  localStorage.setItem("token", token);
}

function loadSession() {
  const email = localStorage.getItem("email");
  const token = localStorage.getItem("token");
  if (email && token) {
    document.getElementById("auth-section").classList.add("hidden");
    document.getElementById("game-section").classList.remove("hidden");
    document.getElementById("user-email").innerText = email;
    loadPuzzle();
    loadLeaderboard();
  }
}
loadSession();

/* -------------------------
   AUTH FUNCTIONS
-------------------------- */
async function registerUser() {
  const email = document.getElementById("reg-email").value;
  const password = document.getElementById("reg-password").value;

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "register", email, password })
    });

    const data = await res.json();
    document.getElementById("auth-message").innerText = data.success
      ? "Registration successful. You can now log in."
      : data.error;

  } catch (err) {
    console.error("Register error:", err);
  }
}

async function login() {
  const email = document.getElementById("login-email").value;
  const password = document.getElementById("login-password").value;

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "login", email, password })
    });

    const data = await res.json();

    if (data.success) {
      saveSession(data.email, data.token);
      document.getElementById("auth-section").classList.add("hidden");
      document.getElementById("game-section").classList.remove("hidden");
      document.getElementById("user-email").innerText = data.email;
      loadPuzzle();
      loadLeaderboard();
    } else {
      document.getElementById("auth-message").innerText = data.error;
    }

  } catch (err) {
    console.error("Login error:", err);
  }
}

/* -------------------------
   PUZZLE LOADING
-------------------------- */
function loadPuzzle() {
  const puzzleId = document.getElementById("puzzle-select").value;

  if (puzzleId === "puzzle1") {
    document.getElementById("puzzle-description").innerText = "Puzzle 1: What is 1 + 0?";
  }
  if (puzzleId === "puzzle2") {
    document.getElementById("puzzle-description").innerText = "Puzzle 2: What is 2 + 2?";
  }
  if (puzzleId === "puzzle3") {
    document.getElementById("puzzle-description").innerText = "Puzzle 3: What is 5 - 3?";
  }

  document.getElementById("puzzle-answer").value = "";
  document.getElementById("puzzle-message").innerText = "";
}

/* -------------------------
   PUZZLE SUBMISSION
-------------------------- */
async function submitPuzzle() {
  const answer = document.getElementById("puzzle-answer").value;
  const email = localStorage.getItem("email");
  const token = localStorage.getItem("token");
  const puzzleId = document.getElementById("puzzle-select").value;

  let correctAnswer = "";
  if (puzzleId === "puzzle1") correctAnswer = "1";
  if (puzzleId === "puzzle2") correctAnswer = "4";
  if (puzzleId === "puzzle3") correctAnswer = "2";

  if (answer !== correctAnswer) {
    document.getElementById("puzzle-message").innerText = "Incorrect!";
    return;
  }

  const score = Math.floor(Math.random() * 1000);

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        action: "saveScore",
        email,
        token,
        score,
        puzzleId
      })
    });

    const data = await res.json();
    document.getElementById("puzzle-message").innerText = data.success
      ? "Correct! Score saved."
      : data.error;

    loadLeaderboard();

  } catch (err) {
    console.error("Submit error:", err);
  }
}

/* -------------------------
   LEADERBOARD
-------------------------- */
async function loadLeaderboard() {
  const puzzleId = document.getElementById("leaderboard-select").value;

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        action: "leaderboard",
        puzzleId
      })
    });

    const data = await res.json();
    const list = document.getElementById("leaderboard");
    list.innerHTML = "";

    if (data.success) {
      data.leaderboard.forEach(entry => {
        const li = document.createElement("li");
        li.textContent = `${entry.email}: ${entry.bestScore}`;
        list.appendChild(li);
      });
    }

  } catch (err) {
    console.error("Leaderboard error:", err);
  }
}

/* -------------------------
   LOGOUT
-------------------------- */
function logout() {
  localStorage.clear();
  location.reload();
}
</script>

</body>
</html>
